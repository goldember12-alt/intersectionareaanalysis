<svg xmlns="http://www.w3.org/2000/svg" width="900" height="430" viewBox="0 0 900 430" role="img" aria-labelledby="title desc">
  <title id="title">AADT-normalized aggregate rate summary by signal-relative direction</title>
  <desc id="desc">Descriptive aggregate-only crash rates per million VMT-like exposure with exact 95 percent confidence intervals.</desc>
  <rect width="900" height="430" fill="#ffffff"/>
  <text x="40" y="44" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#202124">AADT-normalized aggregate rate by signal-relative direction</text>
  <text x="40" y="70" font-family="Arial, sans-serif" font-size="13" fill="#5f6368">Descriptive AADT-normalized prototype; aggregate only; unit-level rates suppressed.</text>

  <line x1="210" y1="290" x2="690" y2="290" stroke="#9aa0a6" stroke-width="1"/>
  <line x1="210" y1="286" x2="210" y2="294" stroke="#9aa0a6" stroke-width="1"/>
  <line x1="330" y1="286" x2="330" y2="294" stroke="#9aa0a6" stroke-width="1"/>
  <line x1="450" y1="286" x2="450" y2="294" stroke="#9aa0a6" stroke-width="1"/>
  <line x1="570" y1="286" x2="570" y2="294" stroke="#9aa0a6" stroke-width="1"/>
  <line x1="690" y1="286" x2="690" y2="294" stroke="#9aa0a6" stroke-width="1"/>
  <text x="201" y="314" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">0.96</text>
  <text x="321" y="314" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">0.99</text>
  <text x="441" y="314" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">1.02</text>
  <text x="561" y="314" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">1.05</text>
  <text x="681" y="314" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">1.08</text>
  <text x="350" y="340" font-family="Arial, sans-serif" font-size="13" fill="#3c4043">Crashes per million VMT-like exposure</text>

  <text x="40" y="132" font-family="Arial, sans-serif" font-size="14" fill="#3c4043">Downstream of reference signal</text>
  <line x1="421" y1="128" x2="585" y2="128" stroke="#1f77b4" stroke-width="3"/>
  <line x1="421" y1="120" x2="421" y2="136" stroke="#1f77b4" stroke-width="2"/>
  <line x1="585" y1="120" x2="585" y2="136" stroke="#1f77b4" stroke-width="2"/>
  <circle cx="492" cy="128" r="6" fill="#1f77b4"/>
  <text x="710" y="124" font-family="Arial, sans-serif" font-size="13" fill="#202124">1.030462</text>
  <text x="710" y="142" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">95% CI: 1.005148 to 1.056253</text>
  <text x="40" y="152" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">6,288 assigned crashes; 6,102,114,566.998032 VMT-like exposure</text>

  <text x="40" y="216" font-family="Arial, sans-serif" font-size="14" fill="#3c4043">Upstream of reference signal</text>
  <line x1="353" y1="212" x2="586" y2="212" stroke="#2ca02c" stroke-width="3"/>
  <line x1="353" y1="204" x2="353" y2="220" stroke="#2ca02c" stroke-width="2"/>
  <line x1="586" y1="204" x2="586" y2="220" stroke="#2ca02c" stroke-width="2"/>
  <circle cx="414" cy="212" r="6" fill="#2ca02c"/>
  <text x="710" y="208" font-family="Arial, sans-serif" font-size="13" fill="#202124">1.010882</text>
  <text x="710" y="226" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">95% CI: 0.985725 to 1.036519</text>
  <text x="40" y="236" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">6,126 assigned crashes; 6,060,055,108.108314 VMT-like exposure</text>

  <text x="40" y="378" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Caveats: provisional bidirectional AADT assumption; DIRECTION_FACTOR not applied; missing/review AADT excluded.</text>
  <text x="40" y="397" font-family="Arial, sans-serif" font-size="12" fill="#5f6368">Not safety performance, risk, danger, causal, policy guidance, or downstream functional area distance guidance.</text>
</svg>
